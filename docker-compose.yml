# Agent Bus — Docker Compose
# Runs hub and gateway as separate services.
#
# Usage:
#   docker compose up           # Start both services
#   docker compose up hub       # Hub only
#   docker compose up gateway   # Gateway only
#
# Copy .env.example to .env and fill in values before running.

services:
  hub:
    build: .
    command: node dist/index.js
    ports:
      - "4000:4000"
    env_file: .env
    volumes:
      # Persist JSONL event log on host
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  gateway:
    build: .
    command: node dist/gateway/index.js
    ports:
      - "18789:18789"
    env_file: .env
    environment:
      # Override hub URL to use Docker service name instead of localhost
      HUB_URL: ws://hub:4000
    depends_on:
      hub:
        condition: service_healthy
    restart: unless-stopped
